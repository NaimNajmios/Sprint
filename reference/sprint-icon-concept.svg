<svg width="216" height="216" viewBox="0 0 108 108" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <clipPath id="iconMask">
      <rect x="0" y="0" width="108" height="108" rx="24" ry="24"/>
    </clipPath>
  </defs>

  <g clip-path="url(#iconMask)">
    <!-- Background layer: surface.hero navy -->
    <rect x="0" y="0" width="108" height="108" fill="#161A2C"/>

    <!-- Subtle depth: faint radial glow, echoes hero panel's quiet depth -->
    <ellipse cx="54" cy="40" rx="46" ry="30" fill="#1E2440" opacity="0.5"/>

    <!-- Foreground glyph: abstracted wave/sparkline, same motif as HeroPanel's chart -->
    <path d="M20,64 C26,64 30,44 38,44 S50,64 56,64 S80,40 86,40"
          fill="none"
          stroke="#C8FF00"
          stroke-width="5.5"
          stroke-linecap="round"
          stroke-linejoin="round"/>

    <!-- Highlighted data point, echoes the HeroPanel chart's callout dot — sits on the first peak -->
    <circle cx="38" cy="44" r="5" fill="#C8FF00"/>
    <circle cx="38" cy="44" r="5" fill="none" stroke="#161A2C" stroke-width="1.5"/>
  </g>
</svg>
